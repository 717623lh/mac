name: Build macOS App

on:
  push:
    branches: [master]
  workflow_dispatch:          # 允许在 GitHub 网页上手动触发

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 确认 Apple Silicon 构建环境
        run: |
          uname -m
          test "$(uname -m)" = "arm64"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: 运行测试
        env:
          PYTHONPATH: .
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      - name: 打包为 macOS .app
        run: |
          pyinstaller --windowed \
            --name "AStockScreener" \
            --add-data "data:data" \
            --collect-all akshare \
            --hidden-import tkinter \
            stock_screener.py

      - name: 创建 .app 外层文件夹
        run: |
          mkdir -p dist/app
          mv dist/AStockScreener.app dist/app/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: AStockScreener-macOS-arm64
          path: dist/app/
